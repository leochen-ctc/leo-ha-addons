name: "Smart Home Butler"
version: "4.7.0"
slug: "smart_home_butler"
description: "AI-powered proactive smart home manager"
image: "ghcr.io/leochen-ctc/smart-home-butler"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
hassio_api: true
hassio_role: admin
homeassistant_api: true
ingress: true
ingress_port: 8266
ports:
  8266/tcp: 8266
panel_icon: "mdi:account-tie"
panel_title: "智慧管家"
map:
  - config:rw
  - addon_config:rw
options:
  gemini_api_key: ""
  line_channel_secret: ""
  line_channel_access_token: ""
  passphrase: "change_me_to_a_secret_passphrase"
  debug: false
schema:
  gemini_api_key: password
  line_channel_secret: password
  line_channel_access_token: password
  passphrase: str
  debug: bool
